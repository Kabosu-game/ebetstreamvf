name: Deploy Laravel App

on:
  push:
    branches: ["main"]
  workflow_dispatch: # Déploiement manuel possible

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: mbstring, xml, ctype, iconv, intl, pdo_mysql, dom, filter, gd, json, bcmath
          tools: composer:v2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install PHP dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader --no-dev

      - name: Install Node dependencies
        run: npm ci --prefer-offline --no-audit

      - name: Build assets
        run: npm run build

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.SERVER_IP }}" >> ~/.ssh/known_hosts

      - name: Check SSH connectivity
        run: |
          SSH_PORT="${{ secrets.SERVER_PORT }}"
          if [ -z "$SSH_PORT" ]; then SSH_PORT=22; fi
          echo "🔎 Test connectivité SSH vers ${{ secrets.SERVER_IP }}:$SSH_PORT"
          timeout 12 bash -c "cat < /dev/null > /dev/tcp/${{ secrets.SERVER_IP }}/${SSH_PORT}" || {
            echo "❌ Impossible de joindre le serveur SSH (${{ secrets.SERVER_IP }}:$SSH_PORT)."
            echo "Vérifiez SERVER_IP, SERVER_PORT, firewall/security group et que sshd écoute."
            exit 1
          }
          echo "✅ SSH reachable"

      - name: Deploy files to VPS
        run: |
          SSH_PORT="${{ secrets.SERVER_PORT }}"
          if [ -z "$SSH_PORT" ]; then SSH_PORT=22; fi
          rsync -avz --delete \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='node_modules' \
            --exclude='.env' \
            --exclude='storage/app/*' \
            --exclude='storage/logs/*' \
            --exclude='storage/framework/cache/*' \
            --exclude='storage/framework/sessions/*' \
            --exclude='storage/framework/views/*' \
            --exclude='storage/*.key' \
            --exclude='bootstrap/cache/*' \
            --chmod=D755,F644 \
            -e "ssh -p ${SSH_PORT} -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -o ConnectTimeout=15" \
            ./ "${{ secrets.SERVER_USER }}"@"${{ secrets.SERVER_IP }}":"${{ secrets.DEPLOY_PATH }}" || [ $? -eq 23 ] && echo "⚠️ Transfert terminé avec avertissements" || exit $?

      - name: Run post-deployment commands
        run: |
          SSH_PORT="${{ secrets.SERVER_PORT }}"
          if [ -z "$SSH_PORT" ]; then SSH_PORT=22; fi
          ssh -p "${SSH_PORT}" -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -o ConnectTimeout=15 "${{ secrets.SERVER_USER }}"@"${{ secrets.SERVER_IP }}" << 'ENDSSH'
            set -e
            cd "${{ secrets.DEPLOY_PATH }}"
            # Fix permissions
            sudo chown -R apache:apache storage bootstrap/cache
            sudo chmod -R 775 storage bootstrap/cache
            # Nettoyer les caches uniquement si .env existe
            if [ -f .env ]; then
              sudo php artisan config:clear
              sudo php artisan cache:clear
              sudo php artisan route:clear
              sudo php artisan config:cache
              sudo php artisan route:cache 
              sudo php artisan storage:link
            else
              echo "⚠️ .env introuvable, commandes artisan ignorées."
            fi
            sudo systemctl reload php-fpm 2>/dev/null || true
            sudo systemctl reload nginx 2>/dev/null || true
            echo "✅ Déploiement terminé avec succès"
          ENDSSH
